version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_CLIENT_HOST: postgres
      DB_CLIENT_USER: quiz_app_client
      DB_CLIENT_PASSWORD: client_secure_password
      DB_CLIENT_NAME: quiz_app_db
      DB_ADMIN_HOST: postgres
      DB_ADMIN_USER: quiz_admin_user
      DB_ADMIN_PASSWORD: admin_secure_password
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - quiz-network

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quiz_app_client
      POSTGRES_PASSWORD: client_secure_password
      POSTGRES_DB: quiz_app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - quiz-network

volumes:
  postgres_data:

networks:
  quiz-network:
    driver: bridge
